<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dia 1: Quebrando a Rotina - Respira</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #F5F4F0;
            --bg-card: #FFFFFF;
            --bg-dark: #111111;
            --accent-gold: #C29B62;
            --text-main: #111111;
            --text-light: #5A5A58;
            --border-color: #DCD7CD;
            --radius-lg: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- UI COMPONENTS --- */
        header {
            padding: 20px;
            text-align: center;
        }
        .logo { font-weight: 800; letter-spacing: -1px; font-size: 1.2rem; }
        .logo span { color: var(--accent-gold); font-weight: 300; }

        .app-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .screen {
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden { display: none; opacity: 0; transform: translateY(20px); }
        .active { display: block; opacity: 1; transform: translateY(0); }

        /* --- INTRO SCREEN --- */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: var(--bg-dark);
            color: var(--accent-gold);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 15px; line-height: 1.2; }
        .desc { color: var(--text-light); margin-bottom: 30px; font-size: 0.95rem; }

        .meta-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .meta-item { font-size: 0.85rem; font-weight: 600; color: var(--text-light); }
        .meta-item i { color: var(--accent-gold); margin-right: 5px; }

        .input-group { margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }
        input[type="text"]:focus { border-color: var(--accent-gold); }

        .btn-start {
            width: 100%;
            padding: 18px;
            background: var(--bg-dark);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-start:active { transform: scale(0.98); }

        /* --- PLAYER SCREEN --- */
        .visualizer {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            position: relative;
        }
        .visualizer::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .user-greeting { font-weight: 600; margin-bottom: 10px; }
        .ai-quote { font-style: italic; color: var(--text-light); font-size: 0.9rem; margin-bottom: 40px; min-height: 2.7rem;}

        .player-controls {
            background: white;
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #EEE;
            border-radius: 3px;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-gold);
            border-radius: 3px;
            position: relative;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .play-btn {
            width: 65px;
            height: 65px;
            background: var(--bg-dark);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: background 0.3s;
        }
        .play-btn:hover { background: var(--accent-gold); }

        footer { padding: 20px; text-align: center; font-size: 0.7rem; color: #AAA; }

    </style>
</head>
<body>

    <header>
        <div class="logo">RESPIRA<span>.</span></div>
    </header>

    <main class="app-container">
        
        <!-- TELA 1: INTRO -->
        <section id="intro-screen" class="screen active">
            <span class="badge">Dia 1</span>
            <h1>Quebrando a Rotina</h1>
            <p class="desc">Inicie a desprogramação dos gatilhos emocionais da nicotina no seu subconsciente.</p>
            
            <div class="meta-info">
                <span class="meta-item"><i class="far fa-clock"></i> 18 min</span>
                <span class="meta-item"><i class="fas fa-wave-square"></i> Ondas Theta</span>
            </div>

            <div class="input-group">
                <input type="text" id="user-name" placeholder="Digite seu primeiro nome" autocomplete="off">
            </div>
            <button class="btn-start" onclick="startSession()">Iniciar Sessão</button>
        </section>

        <!-- TELA 2: EXPERIÊNCIA -->
        <section id="experience-screen" class="screen hidden">
            <div class="visualizer">
                <i class="fas fa-leaf" style="font-size: 3rem; color: var(--accent-gold);"></i>
            </div>
            
            <h2 class="user-greeting" id="greeting-text">Iniciando...</h2>
            <p class="ai-quote" id="ai-quote">"Prepare sua mente para a liberdade."</p>

            <div class="player-controls">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">00:00</span>
                    <span id="total-time">18:00</span>
                </div>
                <button class="play-btn" id="play-pause">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
            </div>
        </section>

    </main>

    <footer>
        &copy; 2026 Plataforma Respira. Áudio de Alta Fidelidade Mental.
    </footer>

    <script>
        // Placeholder de áudio (substitua pelo seu link real .mp3)
        const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        const totalDuration = 18 * 60; // 18 minutos em segundos
        let isPlaying = false;

        async function startSession() {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("Por favor, digite seu nome.");

            // Transição suave
            document.getElementById('intro-screen').classList.remove('active');
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('experience-screen').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('experience-screen').classList.add('active');
                }, 50);
            }, 600);

            document.getElementById('greeting-text').innerText = `Sessão de ${name}`;

            // Chamada à API para personalizar (opcional, mas demonstra o fluxo Micro SaaS)
            try {
                const response = await fetch(`/api/welcome?name=${name}`);
                const data = await response.json();
                document.getElementById('ai-quote').innerText = data.quote;
            } catch (e) {
                console.log("Modo offline: usando frases padrão.");
            }
        }

        // Lógica do Player
        const playBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
            } else {
                audio.play();
                playIcon.classList.replace('fa-play', 'fa-pause');
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${percent}%`;
            
            // Formatar tempo
            let mins = Math.floor(audio.currentTime / 60);
            let secs = Math.floor(audio.currentTime % 60);
            currentTimeEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        });

        // Simulação de clique na barra de progresso
        document.getElementById('progress-container').addEventListener('click', (e) => {
            const width = e.currentTarget.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

    </script>
</body>
</html>
